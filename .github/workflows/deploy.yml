name: Deploy

# Builds the container image on every push to main, after CI passes. Wire the
# final push/deploy step to your host (Fly, Render, Azure Container Apps, ...) by
# filling in the registry + deploy secrets. Left as build-only so main is never
# blocked on infra that isn't provisioned yet.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  build-image:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: klovered-python:${{ github.sha }}

