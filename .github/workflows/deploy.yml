name: Deploy

# After CI passes on main, SSH into the Droplet, pull the new code, and
# rebuild the stack. The Droplet holds a clone of this repo at ~/Klovered-python
# and the real secrets in its own .env (never in the repo).
#
# Required repo secrets:
#   DROPLET_HOST      the Droplet's public IP / hostname
#   DROPLET_USER      ssh user (e.g. root, or a deploy user)
#   DROPLET_SSH_KEY   a private key whose public half is in the Droplet's authorized_keys
#                     (generate a DEDICATED deploy key — do not reuse your laptop key)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/Klovered-python
            git pull --ff-only

            # klovered.com runs the FULL stack (web + caddy + api) from
            # docker-compose.stack.yml, brought up from this directory so the
            # compose project is the default "klovered-python". A BACKEND change
            # must update ONLY the api service in place — never rebuild or
            # restart the marketing web or caddy — so the live site is
            # unaffected. (Marketing/web deploys are handled separately.)
            COMPOSE="docker compose -f docker-compose.stack.yml"

            $COMPOSE build api
            # Idempotent: creates/updates tables, app_user, RLS on DO Managed PG
            # (reachable from the Droplet's private VPC endpoint). One-off container.
            $COMPOSE run --rm api python scripts/apply_schema.py
            # Recreate ONLY api; --no-deps leaves web + caddy running untouched.
            $COMPOSE up -d --no-deps api
            sleep 4
            $COMPOSE exec -T api python -c "import httpx; print(httpx.get('http://localhost:8000/health').text)"
            docker image prune -f
