name: Deploy

# After CI passes on main, SSH into the Droplet, pull the new code, and
# rebuild the stack. The Droplet holds a clone of this repo at ~/Klovered-python
# and the real secrets in its own .env (never in the repo).
#
# Required repo secrets:
#   DROPLET_HOST      the Droplet's public IP / hostname
#   DROPLET_USER      ssh user (e.g. root, or a deploy user)
#   DROPLET_SSH_KEY   a private key whose public half is in the Droplet's authorized_keys
#                     (generate a DEDICATED deploy key — do not reuse your laptop key)

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -e
            cd ~/Klovered-python
            git pull --ff-only
            docker compose -f docker-compose.prod.yml build
            # Idempotent: creates/updates tables, app_user, RLS on DO Managed PG
            # (reachable from the Droplet's private VPC endpoint).
            docker compose -f docker-compose.prod.yml run --rm api python scripts/apply_schema.py
            docker compose -f docker-compose.prod.yml up -d
            sleep 4
            docker compose -f docker-compose.prod.yml exec -T api python -c "import httpx; print(httpx.get('http://localhost:8000/health').text)"
            docker image prune -f
