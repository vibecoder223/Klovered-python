# Full Droplet stack: FastAPI backend + Next.js marketing site + Caddy, on one
# box, using DO Managed Postgres (no bundled db — the Droplet is in the VPC).
#
# Expected clone layout (siblings):
#   ~/Klovered-python           (this repo — run compose from here)
#   ~/klovered-landing-human    (the marketing repo, i.e. Propello-LandingPage)
#
# Setup on the Droplet (once):
#   cd ~/Klovered-python
#   cp .env.example .env      # fill DB / AUTH_JWT_SECRET / MISTRAL / DOMAIN / etc.
#   docker compose -f docker-compose.stack.yml build
#   docker compose -f docker-compose.stack.yml run --rm api python scripts/apply_schema.py
#   docker compose -f docker-compose.stack.yml up -d

services:
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      STORAGE_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    expose:
      - "8000"

  web:
    build:
      context: ../klovered-landing-human
      args:
        # NEXT_PUBLIC_* is inlined at build time — where the CTAs point must be
        # known now. Defaults to the same-origin /app path where the tool is
        # served; override in .env only for an off-domain tool.
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-/app}
        # Umami website id for THIS site (see the umami service below). Empty
        # by default, so the tracker script only renders once you've set it.
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID_WEB:-}
    restart: unless-stopped
    # Runtime-only secrets (server-side /api/contact via Resend).
    environment:
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      CONTACT_TO_EMAIL: ${CONTACT_TO_EMAIL:-}
      RESEND_FROM: ${RESEND_FROM:-}
    expose:
      - "3000"

  # The guest-first RFP tool (klovered-free), served at klovered.com/app. Thin
  # client: it calls the api service via /api/* (same origin through Caddy), so
  # it needs no DB/secret of its own. Cloned as a sibling on the Droplet.
  tool:
    build:
      context: ../klovered-free
      args:
        # Same-origin in production; the marketing site is the domain root.
        NEXT_PUBLIC_API_BASE: ""
        NEXT_PUBLIC_MARKETING_URL: "/"
        # Separate Umami website id — the tool is tracked as its own site
        # (different funnel: guest sessions, not marketing pageviews).
        NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID_TOOL:-}
    restart: unless-stopped
    expose:
      - "3100"

  # Self-hosted, first-party visitor analytics (Umami) for the marketing site
  # and the tool — no third-party script, no cookie banner needed. Reverse
  # proxied at /analytics (see Caddyfile), so it rides the same TLS cert with
  # no extra DNS/subdomain. Uses its own database on the SAME Postgres server
  # (a separate DB, not mixed into the app schema) — see UMAMI_DATABASE_URL.
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${UMAMI_DATABASE_URL}
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      # Required because Caddy exposes it under a path, not its own host.
      BASE_PATH: /analytics
      DISABLE_TELEMETRY: "1"
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
      - umami
    environment:
      DOMAIN: ${DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  uploads:
  caddy_data:
  caddy_config:
